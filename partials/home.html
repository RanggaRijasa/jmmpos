      <section class="tablet-screen view active" id="home-view" aria-label="Homepage utama">
        <header class="topbar home-topbar">
          <div class="home-header-left">
            <div class="home-title">
              <p class="eyebrow">Selamat datang kembali,</p>
              <h1>Kasir JMM Salon</h1>
              <p class="subtitle">Pilih menu utama langsung dari layar tablet.</p>
            </div>
          </div>
          <img class="home-header-logo" src="assets/images/JMMSALON2Transparant.png" alt="JMM Salon" />
          <div class="home-header-spacer">
            <button
              class="home-online-compact"
              id="manage-staff-presence"
              type="button"
              aria-haspopup="dialog"
              aria-expanded="false"
              aria-controls="staff-presence-modal"
            >
              <span class="home-online-icon" aria-hidden="true">●</span>
              <span class="home-online-compact-copy">
                <strong>Petugas Online <b id="home-online-staff-count">0</b></strong>
                <small><span id="home-online-staff-branch">Cabang Kartini</span> · <span id="home-online-staff-summary">Belum diatur</span></small>
              </span>
              <span class="home-online-chevron" aria-hidden="true">›</span>
            </button>
            <div class="operator home-operator">
              <div class="date-block">
                <strong>Sabtu, 27 Juni 2026</strong>
                <span>16:30 WIB</span>
              </div>
              <span class="avatar">K</span>
              <div class="operator-info">
                <strong>Kasir JMM</strong>
                <span>Kasir · <b id="home-branch-label">Cabang Kartini</b></span>
              </div>
            </div>
          </div>
        </header>

        <div class="home-grid">
          <button class="menu-tile" data-target="pos-view">
            <span class="tile-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
              </svg>
            </span>
            <strong>Penjualan POS</strong>
            <small>Transaksi cepat</small>
          </button>
          <button class="menu-tile" data-target="customer-list-view">
            <span class="tile-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
              </svg>
            </span>
            <strong>Pelanggan</strong>
            <small>Data pelanggan</small>
          </button>
          <button class="menu-tile" data-target="sales-view">
            <span class="tile-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
              </svg>
            </span>
            <strong>Daftar Penjualan</strong>
            <small>Riwayat transaksi</small>
          </button>
          <button class="menu-tile" data-target="pending-view">
            <span class="tile-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
              </svg>
            </span>
            <strong>Daftar Pending</strong>
            <small>Transaksi pending</small>
          </button>
          <button class="menu-tile" data-target="membership-view">
            <span class="tile-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
              </svg>
            </span>
            <strong>Membership</strong>
            <small>Status & progres member</small>
          </button>
          <button class="menu-tile" data-target="reminder-view">
            <span class="tile-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
              </svg>
            </span>
            <strong>Reminder</strong>
            <small>Follow-up pelanggan</small>
          </button>
        </div>

        <footer class="bottom-command">
          <span>Siap melayani pelanggan berikutnya</span>
          <div class="bottom-command-right">
            <button class="cms-entry-button" id="cms-entry-button" type="button">CMS</button>
            <button class="logout-button" id="logout-button" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
              </svg>
              Logout
            </button>
          </div>
        </footer>
      </section>
